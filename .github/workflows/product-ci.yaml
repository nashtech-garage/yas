name: product service ci

on:
  push:
    branches: ["**"]
    paths:
      - "product/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/product-ci.yaml"
      - "pom.xml"
  pull_request:
    branches: ["**"]
    paths:
      - "product/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/product-ci.yaml"
      - "pom.xml"
  workflow_dispatch:

jobs:
  Test:
    name: Test Phase
    runs-on: ubuntu-latest
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis

      - uses: ./.github/workflows/actions

      - name: Run Maven Test Command
        run: mvn clean test jacoco:report -pl product -am

      - name: Test Results
        uses: dorny/test-reporter@v1
        if: ${{ success() || failure() }}
        with:
          name: Product-Service-Unit-Test-Results
          path: "product/**/*-reports/TEST*.xml"
          reporter: java-junit

      - name: Enforce Coverage Threshold > 70%
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET
          from pathlib import Path

          jacoco_file = Path('product/target/site/jacoco/jacoco.xml')
          if not jacoco_file.exists():
              raise SystemExit('jacoco.xml not found. Ensure tests and jacoco:report ran successfully.')

          tree = ET.parse(jacoco_file)
          root = tree.getroot()

          line_counter = None
          for counter in root.findall('counter'):
              if counter.attrib.get('type') == 'LINE':
                  line_counter = counter
                  break

          if line_counter is None:
              raise SystemExit('LINE coverage counter not found in jacoco.xml')

          covered = int(line_counter.attrib.get('covered', 0))
          missed = int(line_counter.attrib.get('missed', 0))
          total = covered + missed
          coverage = 0.0 if total == 0 else covered * 100.0 / total

          print(f'Line coverage: {coverage:.2f}% (covered={covered}, missed={missed})')

          if coverage <= 70.0:
              raise SystemExit(f'Coverage gate failed: {coverage:.2f}% <= 70.00%')
          PY

      - name: Upload Coverage Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: product-coverage-report
          path: product/target/site/jacoco/

      - name: Analyze with sonar cloud
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -pl common-library,product -am \
            -Dsonar.projectKey=JuzHarii_yas \
            -Dsonar.organization=juzharii \
            -Dsonar.host.url=https://sonarcloud.io

      - name: Setup Snyk
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: snyk/actions/setup@master

      - name: Run Snyk Security Scan
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --command=mvn --org=${{ vars.SNYK_ORG }} --file=product/pom.xml --severity-threshold=high

  Build:
    name: Build Phase
    runs-on: ubuntu-latest
    needs: Test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/workflows/actions

      - name: Run Gitleaks Scan
        run: |
          docker pull zricethezav/gitleaks:v8.18.4
          docker run --rm -v ${{ github.workspace }}:/work -w /work zricethezav/gitleaks:v8.18.4 detect --source="." --config="/work/gitleaks.toml" --verbose --no-git

      - name: Run Maven Build Command
        run: mvn clean install -DskipTests -pl common-library,product -am

      - name: Log in to the Container registry
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker images
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@v6
        with:
          context: ./product
          push: true
          tags: ghcr.io/nashtech-garage/yas-product:latest