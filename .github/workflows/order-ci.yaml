name: order service ci

on:
  push:
    branches: ["**"]
    paths:
      - "order/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/order-ci.yaml"
      - "pom.xml"
  pull_request:
    branches: ["main"]
    paths:
      - "order/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/order-ci.yaml"
      - "pom.xml"
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────
  # PHASE 1 – TEST
  # Chạy trên mọi push (kể cả feature branch) để developer có feedback sớm nhất.
  # ─────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Cần cho SonarCloud (blame history) và Gitleaks (full log)

      - uses: ./.github/workflows/actions # Setup JDK 21, cache Maven & Sonar

      # Gitleaks – quét secret/token bị lộ trong lịch sử commit
      - name: Gitleaks – Scan for leaked secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Bước 1/2 Maven: build TẤT CẢ module mà order phụ thuộc (-am), bỏ qua test của chúng.
      # Lý do tách riêng: nếu gộp chung (-am + test), Maven sẽ chạy test của dependency
      # modules (inventory-client, cart, ...) – không cần thiết và rất chậm.
      # Sau bước này các jar dependency được install vào ~/.m2 (cached giữa các job).
      - name: Build Dependencies (no tests)
        run: mvn -B clean install -pl order -am -DskipTests

      # Bước 2/2 Maven: chỉ chạy verify cho riêng order (không -am vì dep đã có trong ~/.m2).
      # verify = compile → test → jacoco:report → jacoco:check
      # Kết quả: surefire-reports/ + site/jacoco/jacoco.xml
      - name: Run Tests & Generate Coverage (order only)
        run: mvn -B verify -pl order

      # Checkstyle chỉ cho order, bỏ -am vì deps đã build ở bước trên
      - name: Run Maven Checkstyle
        run: mvn checkstyle:checkstyle -pl order -Dcheckstyle.output.file=order-checkstyle-result.xml

      - name: Upload Checkstyle Result
        uses: jwgmeligmeyling/checkstyle-github-action@master
        with:
          path: "**/order-checkstyle-result.xml"

      # Upload kết quả test để hiển thị trực tiếp trên PR/commit page
      - name: Upload Test Results
        uses: dorny/test-reporter@v1
        if: success() || failure() # Chạy kể cả khi test fail để xem report
        with:
          name: Order-Service-Unit-Test-Results
          path: "order/**/surefire-reports/TEST*.xml"
          reporter: java-junit

      # Comment coverage lên PR; action sẽ fail step nếu coverage < 70% (min-coverage-overall)
      # → ngăn merge khi coverage thấp (kết hợp với branch protection "require status checks")
      - name: Add Coverage Report to PR
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: ${{ github.workspace }}/order/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 70
          min-coverage-changed-files: 70
          title: "Order Coverage Report"
          update-comment: true

      # Snyk – quét lỗ hổng trong dependencies (CVE)
      # continue-on-error: true để không block pipeline; kết quả chỉ mang tính cảnh báo
      - name: Snyk – Scan for vulnerabilities
        uses: snyk/actions/maven@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=order/pom.xml --severity-threshold=high

      # SonarCloud – tái sử dụng compiled classes + test reports từ bước verify ở trên.
      # Lý do KHÔNG dùng "verify sonar:sonar": sẽ chạy lại toàn bộ compile+test lần 2.
      # -DskipTests: bỏ qua re-run test (classes đã có trong order/target/).
      # Trỏ thẳng tới jacoco.xml đã tạo để Sonar có dữ liệu coverage.
      - name: SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B sonar:sonar \
            -pl order \
            -DskipTests \
            -Dsonar.organization=nguyenthanhtien539 \
            -Dsonar.projectKey=NguyenThanhTien539_yas \
            -Dsonar.login=${SONAR_TOKEN} \
            -Dsonar.coverage.jacoco.xmlReportPaths=order/target/site/jacoco/jacoco.xml \
            -Dsonar.junit.reportPaths=order/target/surefire-reports

  # ─────────────────────────────────────────────
  # PHASE 2 – BUILD
  # Chỉ chạy khi: PR vào main HOẶC push vào main.
  # Lý do: feature branch chỉ cần test để có feedback nhanh.
  # Build sinh artifact + OWASP scan (nặng ~10 phút) chỉ cần thiết khi sắp merge.
  # ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test # Chỉ chạy nếu phase Test pass
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/workflows/actions

      # Build toàn bộ dependency chain + package order, bỏ qua test (đã chạy ở phase test).
      # Maven cache từ phase test (same pom.xml hash) giúp bước này nhanh hơn đáng kể.
      - name: Run Maven Build
        run: mvn -B clean install -pl order -am -DskipTests

      # OWASP – quét CVE trong toàn bộ dependency tree sau khi build
      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        env:
          JAVA_HOME: /opt/jdk
        with:
          project: "yas"
          path: "."
          format: "HTML"

      - name: Upload OWASP Dependency Check Report
        uses: actions/upload-artifact@v4
        with:
          name: OWASP Dependency Check Report
          path: ${{ github.workspace }}/reports

      # Docker – chỉ build và push khi có commit mới vào main (sau khi PR được merge).
      # Điều kiện: push event (không phải PR) VÀ đang ở nhánh main.
