name: order service ci

on:
  push:
    branches: [ "**" ]
    paths:
      - "order/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/order-ci.yaml"
      - "pom.xml"
  pull_request:
    branches: ["main"]
    paths:
      - "order/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/order-ci.yaml"
      - "pom.xml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
      pull-requests: write
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis
      - uses: ./.github/workflows/actions
      - name: Run Maven Build Command
        run: mvn clean install -pl order -am
      - name: Run Maven Checkstyle
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        run: mvn checkstyle:checkstyle -pl order -am -Dcheckstyle.output.file=order-checkstyle-result.xml
      - name: Upload Checkstyle Result
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: jwgmeligmeyling/checkstyle-github-action@master
        with:
          path: '**/order-checkstyle-result.xml'
      - name: Test Results
        uses: dorny/test-reporter@v1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && (success() || failure()) }}
        with:
          name: Order-Service-Unit-Test-Results
          path: "order/**/*-reports/TEST*.xml"
          reporter: java-junit
      - name: Analyze with sonar cloud
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        env:
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -f order
      - name: Setup Snyk CLI
        uses: snyk/actions/setup@master
      - name: Fix All Execute Permissions
        run: chmod -R +x . || true
      - name: Run Snyk to check for vulnerabilities
        working-directory: order
        continue-on-error: true
        env:
            SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
            snyk config set org=giahuytechie
            snyk monitor --file=pom.xml --project-name=yas-order -- -U
      - name: Add coverage report to PR
        uses: madrapps/jacoco-report@v1.6.1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        with:
          paths: ${{github.workspace}}/order/target/site/jacoco/jacoco.xml
          token: ${{secrets.GITHUB_TOKEN}}
          min-coverage-overall: 70
          min-coverage-changed-files: 70
          title: 'Order Coverage Report'
          update-comment: true

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/workflows/actions
      - name: Build Maven package for Docker
        run: mvn clean package -DskipTests -pl order -am
      - name: Build Docker image (PR check)
        if: ${{ github.event_name == 'pull_request' }}
        uses: docker/build-push-action@v6
        with:
          context: ./order
          push: false
          tags: ghcr.io/devops-hcmus/yas-order:latest
      - name: Log in to the Container registry
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker images
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@v6
        with:
          context: ./order
          push: true
          tags: ghcr.io/devops-hcmus/yas-order:latest
  ci-pass:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: ${{ always() }}
    steps:
      - name: Verify all required jobs passed
        run: |
          if [ "${{ needs.test.result }}" != "success" ] || [ "${{ needs.build.result }}" != "success" ]; then
            echo "test=${{ needs.test.result }}, build=${{ needs.build.result }}"
            exit 1
          fi
