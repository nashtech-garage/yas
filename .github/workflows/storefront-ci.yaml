name: storefront service ci

on:
  push:
    branches: [ "main" ]
    paths:
      - "storefront/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/storefront-ci.yaml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "storefront/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/storefront-ci.yaml"
  workflow_dispatch: 

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Run Gitleaks to detect hardcoded secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: storefront
      - run: npm run build
        working-directory: storefront
      - run: npm run lint
        working-directory: storefront
      - run: npx prettier --check .
        working-directory: storefront
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: storefront
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ github.repository_owner }}_storefront
            -Dsonar.pullrequest.provider=github
            -Dsonar.pullrequest.github.repository=${{ github.repository }}

      - name: Setup Snyk CLI
        uses: snyk/actions/setup@master
      - name: Run Snyk to check for vulnerabilities
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --file=storefront/package.json --severity-threshold=high || true
      - name: Log in to the Container registry
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker images
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@v6
        with:
          context: ./storefront
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/yas-storefront:latest
