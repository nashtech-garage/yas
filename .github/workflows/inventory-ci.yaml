name: inventory service ci

on:
  push:
    branches: ["main"]
    paths:
      - "inventory/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/inventory-ci.yaml"
      - "pom.xml"
  pull_request:
    branches: ["main"]
    paths:
      - "inventory/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/inventory-ci.yaml"
      - "pom.xml"
  workflow_dispatch:

jobs:
  Build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis
      - name: Gitleaks Scan
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/workflows/actions

      # - name: Snyk Open Source Scan
      #   if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
      #   uses: snyk/actions/maven@master
      #   env:
      #     SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      #   with:
      #     args: --severity-threshold=high --file=inventory/pom.xml
          
      - name: Run Maven Build Command
        run: mvn clean install -pl inventory -am
      - name: Run Maven Checkstyle
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        run: mvn checkstyle:checkstyle -pl inventory -am -Dcheckstyle.output.file=inventory-checkstyle-result.xml
      # - uses: actions/setup-node@v4
      #   with:
      #     node-version: "20"
      # - run: npm install snyk -g # install snyk
      # - run: snyk -v
      # - name: Setup Snyk
      #   env:
      #     SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      #   run: snyk auth "$SNYK_TOKEN"

      # - name: install snyk-to-html
      #   run: |
      #     # Install the Snyk JSON to HTML Mapper using npm
      #     npm install snyk-to-html -g
      #     # Convert JSON output from `snyk test --json` into a static HTML
      #     snyk test --json | snyk-to-html -o result.html
      #     mkdir downloads
      #     cp -v /home/runner/work/java-goof/java-goof/*.html /home/runner/work/java-goof/java-goof/downloads

      # # save the HTML in the artifact
      # - name: Use the Upload Artifact GitHub Action
      #   if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
      #   uses: actions/upload-artifact@master
      #   with:
      #     name: results
      #     path: ${{github.workspace}}/reports
      - name: Set up Snyk CLI to check for security issues
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: snyk/actions/setup@806182742461562b67788a64410098c9d9b96adb
          
        # Runs Snyk Code (SAST) analysis and uploads result into GitHub.
        # Use || true to not fail the pipeline
      - name: Snyk Code test
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        # continue-on-error: true
        run: snyk code test --sarif > snyk-code.sarif || true
        
      # - name: Upload results to Github Code Scanning
      #   uses: github/codeql-action/upload-sarif@v3
      #   with:
      #     sarif_file: snyk-code.sarif

        # Runs Snyk Open Source (SCA) analysis and uploads result to Snyk.
      # - name: Snyk Open Source monitor
      #   if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
      #   run: snyk monitor --all-projects

        # Runs Snyk Infrastructure as Code (IaC) analysis and uploads result to Snyk.
        # Use || true to not fail the pipeline.
      - name: Snyk IaC test and report
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        run: snyk iac test --report || true

      - name: Analyze with sonar cloud
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: SonarSource/sonarqube-scan-action@7295e71c9583053f5bf40e9d4068a0c974603ec8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}   # Generate a token on SonarQube, add it to the secrets of this repo with the name SONAR_TOKEN (Settings > Secrets > Actions > add new repository secret)
          SONAR_HOST_URL: "https://sonarcloud.io"
        with:
          # Additional arguments for the sonarcloud scanner
          args:
            # Unique key of your project. You can find it in SonarQube > [my project] > Project Information (top-right menu)
            # mandatory
            -Dsonar.projectKey="Simpolette_yas_test"
            # Comma-separated paths to directories containing main source files.
            #-Dsonar.sources= # optional, default is project base directory
            # When you need the analysis to take place in a directory other than the one from which it was launched
            #-Dsonar.projectBaseDir= # optional, default is .
            # Comma-separated paths to directories containing test source files.
            #-Dsonar.tests= # optional. For more info about Code Coverage, please refer to https://docs.sonarcloud.io/enriching/test-coverage/overview/
            # Adds more detail to both client and server-side analysis logs, activating DEBUG mode for the scanner, and adding client-side environment variables and system properties to the server-side log of analysis report processing.
            #-Dsonar.verbose= # optional, default is false
        
      - name: Add coverage report to PR
        uses: madrapps/jacoco-report@v1.6.1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        with:
          paths: ${{github.workspace}}/inventory/target/site/jacoco/jacoco.xml
          token: ${{secrets.GITHUB_TOKEN}}
          min-coverage-overall: 80
          min-coverage-changed-files: 60
          title: 'Inventory Coverage Report'
          update-comment: true
      - name: Log in to the Container registry
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker images
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@v6
        with:
          context: ./inventory
          # push: true
          load: true
          tags: ghcr.io/nashtech-garage/yas-inventory:latest

      - name: Snyk Container monitor
        if: ${{ github.ref == 'refs/heads/main' }}
        # FIX 3: Point to the correct Dockerfile path in the inventory directory
        run: snyk container monitor ghcr.io/nashtech-garage/yas-inventory:latest --file=inventory/Dockerfile

              # Push the Snyk Code results into GitHub Code Scanning tab
      - name: Upload result to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-code.sarif

          
      
