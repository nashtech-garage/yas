name: sampledata CI

on:
  workflow_dispatch:
  push:
    paths:
      - 'sampledata/**'
      # any pushes to any, matches anything within sampledata recursively
  pull_request:
    branches: ["main"]
    paths:
      - 'sampledata/**'
      # any pull requests to main, matches anything within sampledata recursively

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'
    - name: Debug Info
      run: |
        pwd
        ls -la
    - name: login to docker hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PA_TOKEN }}
        
    - name: Build and Test sampledata Service
      # -pl sampledata: Only build sampledata project
      # -am: Also make dependencies (build common-library if needed)
      run: mvn -B clean verify -pl sampledata -am # switching to system maven
      
    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: sampledata-test-results
        path: | 
          sampledata/target/*-reports/*.xml
          sampledata/target/site/jacoco/*

    - name: enforce minimum coverage and PR comment
      id: jacoco
      uses: madrapps/jacoco-report@v1.7.2
      with:
        paths: |
          ${{ github.workspace }}/sampledata/target/site/jacoco/jacoco.xml
        token: ${{ secrets.GITHUB_TOKEN }}
        min-coverage-overall: 70
        title: "sampledata coverage"
        fail_on_min_coverage: true

    - name: Cache OWASP NVD DB
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository/org/owasp/dependency-check-data
        key: owasp-nvd-${{ runner.os }}

    - name: Checkstyle
      run: mvn checkstyle:check -pl sampledata -am

    - name: OWASP Dependency Check
      run: mvn org.owasp:dependency-check-maven:check -pl sampledata -am

    - name: Upload OWASP Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: sampledata-owasp-report
        path: sampledata/target/dependency-check-report.html