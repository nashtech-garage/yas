name: search CI

on:
  workflow_dispatch:
  push:
    paths:
      - 'search/**'
      # any pushes to any, matches anything within search recursively
  pull_request:
    branches: ["main"]
    paths:
      - 'search/**'
      # any pull requests to main, matches anything within search recursively

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'
    - name: Debug Info
      run: |
        pwd
        ls -la
    - name: login to docker hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PA_TOKEN }}

    - name: downloading more ram
      run: |
        sudo swapoff -a
        sudo sysctl -w vm.swappiness=1
        sudo sysctl -w fs.file-max=262144
        sudo sysctl -w vm.max_map_count=262144
        
    - name: Build and Test search Service
      # -pl search: Only build search project
      # -am: Also make dependencies (build common-library if needed)
      run: mvn -B clean verify -pl search -am # switching to system maven
      
    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: search-test-results
        path: | 
          search/target/*-reports/*.xml
          search/target/site/jacoco/*

    - name: enforce minimum coverage and PR comment
      id: jacoco
      uses: madrapps/jacoco-report@v1.7.2
      with:
        paths: |
          ${{ github.workspace }}/search/target/site/jacoco/jacoco.xml
        token: ${{ secrets.GITHUB_TOKEN }}
        min-coverage-overall: 70
        title: "search coverage"