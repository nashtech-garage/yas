name: backoffice-bff service ci

on:
    push:
        branches: ["main"]
        paths:
            - "backoffice-bff/**"
            - ".github/workflows/actions/action.yaml"
            - ".github/workflows/backoffice-bff-ci.yaml"
            - "pom.xml"
    pull_request:
        branches: ["main"]
        paths:
            - "backoffice-bff/**"
            - ".github/workflows/actions/action.yaml"
            - ".github/workflows/backoffice-bff-ci.yaml"
            - "pom.xml"
    workflow_dispatch:

jobs:
    Build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis
            - uses: ./.github/workflows/actions
            - name: Run Maven Checkstyle
              run: mvn checkstyle:checkstyle -f backoffice-bff -Dcheckstyle.output.file=backoffice-bff-checkstyle-result.xml
            - name: Upload Checkstyle Result
              uses: jwgmeligmeyling/checkstyle-github-action@master
              with:
                  path: "**/backoffice-bff-checkstyle-result.xml"
            - name: Run Maven Verify
              run: mvn clean verify -f backoffice-bff
            - name: Analyze with sonar cloud
              env:
                  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
              run: mvn org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -f backoffice-bff

            - uses: snyk/actions/setup@master
            - name: Snyk test
              run: snyk test --file=backoffice-bff/pom.xml --sarif-file-output=snyk.sarif --severity-threshold=high
              continue-on-error: true # To make sure that SARIF upload gets called
              env:
                  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
            - name: Upload Snyk test result to GitHub Code Scanning
              uses: github/codeql-action/upload-sarif@v3
              with:
                  sarif_file: snyk.sarif

            - name: Log in to the Container registry
              if: ${{ github.ref == 'refs/heads/main' }}
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Build and push Docker images
              if: ${{ github.ref == 'refs/heads/main' }}
              uses: docker/build-push-action@v6
              with:
                  context: ./backoffice-bff
                  push: true
                  tags: ghcr.io/powerstomp/yas-backoffice-bff:latest
