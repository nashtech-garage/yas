name: backoffice-bff service ci

on:
    push:
        branches: ["main"]
        paths:
            - "backoffice-bff/**"
            - ".github/workflows/actions/action.yaml"
            - ".github/workflows/backoffice-bff-ci.yaml"
            - "pom.xml"
    pull_request:
        branches: ["main"]
        paths:
            - "backoffice-bff/**"
            - ".github/workflows/actions/action.yaml"
            - ".github/workflows/backoffice-bff-ci.yaml"
            - "pom.xml"
    workflow_dispatch:

jobs:
    Build:
        runs-on: ubuntu-latest
        permissions:
            checks: write
            contents: read
            packages: write
        env:
            FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis
            - uses: ./.github/workflows/actions
            - name: Run Maven Checkstyle
              if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
              run: mvn checkstyle:checkstyle -f backoffice-bff -Dcheckstyle.output.file=backoffice-bff-checkstyle-result.xml
            - name: Upload Checkstyle Result
              if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
              uses: jwgmeligmeyling/checkstyle-github-action@master
              with:
                  path: "**/backoffice-bff-checkstyle-result.xml"
            - name: Run Maven Verify
              run: mvn clean verify -f backoffice-bff
            - name: Analyze with sonar cloud
              if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
              env:
                  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
              run: mvn org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -f backoffice-bff
            - name: Setup Snyk CLI
              uses: snyk/actions/setup@master
            - name: Fix All Execute Permissions
              run: chmod -R +x . || true
            - name: Run Snyk to check for vulnerabilities
              working-directory: backoffice-bff
              continue-on-error: true
              env:
                  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
              run: |
                  snyk config set org=giahuytechie
                  snyk monitor --file=pom.xml --project-name=yas-backoffice-bff -- -U
            - name: Build Docker image (PR check)
              if: ${{ github.event_name == 'pull_request' }}
              uses: docker/build-push-action@v6
              with:
                  context: ./backoffice-bff
                  push: false
                  tags: ghcr.io/devops-hcmus/yas-backoffice-bff:latest
            - name: Log in to the Container registry
              if: ${{ github.ref == 'refs/heads/main' }}
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Build and push Docker images
              if: ${{ github.ref == 'refs/heads/main' }}
              uses: docker/build-push-action@v6
              with:
                  context: ./backoffice-bff
                  push: true
                  tags: ghcr.io/devops-hcmus/yas-backoffice-bff:latest
