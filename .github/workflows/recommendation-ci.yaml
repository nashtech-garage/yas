name: recommendation service ci

on:
  push:
    branches: ["main"]
    paths:
      - "recommendation/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/recommendation-ci.yaml"
      - "pom.xml"
  pull_request:
    branches: ["main"]
    paths:
      - "recommendation/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/recommendation-ci.yaml"
      - "pom.xml"
  workflow_dispatch:
env:
  FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks Scan
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
  build:
    runs-on: ubuntu-latest
    needs: gitleaks
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/workflows/actions
      - name: Run Maven Build Command
        run: mvn clean install -pl recommendation -am
      
  test:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pull-requests: write
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/workflows/actions
      - name: Run Tests
        run: mvn clean verify -pl recommendation -am
      - name: Test Results
        uses: dorny/test-reporter@v1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && (success() || failure()) }}
        with:
          name: Recommendation-Service-Unit-Test-Results
          path: "recommendation/**/*-reports/TEST*.xml"
          reporter: java-junit
      - name: Analyze with sonar cloud
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn clean verify sonar:sonar -pl recommendation -am
          -Dsonar.projectKey=thanhdatttt_DevOps-Project
          -Dsonar.organization=thanhdatttt
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.token=$SONAR_TOKEN 
          -Dsonar.coverage.jacoco.xmlReportPaths=${{github.workspace}}/recommendation/target/site/jacoco/jacoco.xml
      - name: Add coverage report to PR
        id: jacoco_reporter
        uses: madrapps/jacoco-report@v1.6.1
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        with:
          paths: ${{github.workspace}}/recommendation/target/site/jacoco/jacoco.xml
          token: ${{secrets.GITHUB_TOKEN}}
          min-coverage-overall: 70
          min-coverage-changed-files: 70
          title: 'Recommendation Coverage Report'
          update-comment: true

      - name: Coverage check
        run: |
          OVERALL=${{ steps.jacoco_reporter.outputs['coverage-overall'] }}
          echo "Current Overall Coverage is: $OVERALL%"
          
          if (( $(echo "$OVERALL < 70.0" | bc -l) )); then
            echo "Error: Code Coverage ($OVERALL%) is lower than set standards (70%)!"
            exit 1 
          else
            echo "Code Coverage Pass"
          fi
          
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/maven@v1.0.0
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --sarif-file-output=snyk.sarif

      - name: Upload result to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk.sarif
