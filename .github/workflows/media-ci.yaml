name: media service ci

on:
  push:
    branches: [ "main" ]
    paths:
      - 'media/**'
      - 'common-library/**'
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/media-ci.yaml"
      - "pom.xml"
  pull_request:
    branches: [ "main" ]
    paths:
      - 'media/**'
      - 'common-library/**'
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/media-ci.yaml"
      - "pom.xml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # gitleaks
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        run: |
          docker pull zricethezav/gitleaks:latest
          docker run --rm -v ${{ github.workspace }}:/work -w /work zricethezav/gitleaks:latest detect --source="./media" --config="/work/gitleaks.toml" --verbose --no-git

  # Build
  build:
    needs: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/workflows/actions
      - name: Build Application
        run: mvn clean package -DskipTests -pl media -am

  # Test
  test:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      checks: write
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/workflows/actions

      # test
      - name: Run Tests
        run: mvn clean verify -pl media -am

      # Upload Test Result
      - name: Upload Test Results
        uses: dorny/test-reporter@v2.6.0
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' && (success() || failure()) }}
        with:
          name: Media-Service-Unit-Test-Results
          path: "media/**/*-reports/TEST*.xml"
          reporter: java-junit

      # sonar
      - name: SonarCloud Scan
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          mvn sonar:sonar
          -pl media -am
          -Dsonar.projectKey=thanhdatttt_DevOps-Project
          -Dsonar.organization=thanhdatttt
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.coverage.jacoco.xmlReportPaths=media/target/site/jacoco/jacoco.xml

      # Upload coverage report
      - name: Upload coverage report to PR
        uses: madrapps/jacoco-report@v1.7.2
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        with:
          paths: ${{github.workspace}}/media/target/site/jacoco/jacoco.xml
          token: ${{secrets.GITHUB_TOKEN}}
          min-coverage-overall: 70
          min-coverage-changed-files: 70
          title: "Media Coverage Report"
          update-comment: true

  # security
  security:
    runs-on: ubuntu-latest

    permissions:
      security-events: write

    steps:
      # Run Snyk scan
      - uses: actions/checkout@v4
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/maven@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=media/pom.xml --sarif-file-output=snyk.sarif

      # Upload result to GitHub Security tab
      - name: Upload Snyk SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk.sarif