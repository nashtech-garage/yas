name: media service ci

on:
  push:
    branches-ignore:
      - "main"
    paths:
      - "media/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/media-ci.yaml"
      - "pom.xml"

  pull_request:
    branches: ["main"]
    paths:
      - "media/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/media-ci.yaml"
      - "pom.xml"

  workflow_dispatch: # Cho phép trigger thủ công từ tab Actions trên GitHub

jobs:
  Build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 #github runner -> clone code về máy runner
        with:
          fetch-depth: 0 # Lấy toàn bộ lịch sử commit để Gitleaks có thể phân tích

      - name: Setup Environment
        uses: ./.github/workflows/actions

      # 1. Gitleaks - kiểm tra secret bị lộ
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 2. Build & Test Media Service
      - name: Maven Build
        run: mvn clean install -pl media -am

      # 3. Snyk - scan security dependency
      - name: Setup Snyk CLI
        uses: snyk/actions/setup@master

      - name: Snyk Security Scan
        run: snyk test --file=media/pom.xml --severity-threshold=high
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # 4. SonarCloud - phân tích chất lượng code
      - name: Analyze with Sonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
          -pl media -am \
          -Dsonar.organization=nguyenthanhtien539 \
          -Dsonar.projectKey=NguyenThanhTien539_yas \
          -Dsonar.login=$SONAR_TOKEN

      # 5. Kiểm tra coverage >= 70%
      - name: Check Coverage
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: ${{github.workspace}}/media/target/site/jacoco/jacoco.xml
          token: ${{secrets.GITHUB_TOKEN}}
          min-coverage-overall: 70
          title: "Media Service Coverage"
          update-comment: true

      # 6. Upload Unit Test Result
      - name: Unit Test Results
        uses: dorny/test-reporter@v1
        if: ${{ always() }}
        with:
          name: Media-Service-Unit-Test-Results
          path: "media/target/surefire-reports/*.xml"
          reporter: java-junit
