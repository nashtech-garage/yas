name: backoffice service ci

on:
  push:
    branches: [ "**" ]
    paths:
      - "backoffice/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/backoffice-ci.yaml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "backoffice/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/backoffice-ci.yaml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: backoffice
      - run: npm run build
        working-directory: backoffice
      - run: npm run lint
        working-directory: backoffice
      - run: npx prettier --check .
        working-directory: backoffice
      - run: npm audit --omit=dev
        continue-on-error: true
        working-directory: backoffice
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: 'fs'
          scan-ref: './backoffice'
          format: 'sarif'
          output: 'trivy-results.sarif'
      - name: SonarCloud Scan
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: SonarSource/sonarcloud-github-action@master
        with:
          projectBaseDir: backoffice
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information, if any
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: Setup Snyk CLI
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        uses: snyk/actions/setup@master
      - name: Fix All Execute Permissions
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        run: chmod -R +x . || true
      - name: Run Snyk to check for vulnerabilities
        if: ${{ env.FROM_ORIGINAL_REPOSITORY == 'true' }}
        working-directory: backoffice
        continue-on-error: true
        env:
            SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
            snyk config set org=giahuytechie
            snyk monitor --file=package.json --project-name=yas-backoffice

  build:
    needs: test
    runs-on: ubuntu-latest
    env:
      FROM_ORIGINAL_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image (PR check)
        if: ${{ github.event_name == 'pull_request' }}
        uses: docker/build-push-action@v6
        with:
          context: ./backoffice
          push: false
          tags: ghcr.io/devops-hcmus/yas-backoffice:latest
      - name: Log in to the Container registry
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Docker image
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@v6
        with:
          context: ./backoffice
          tags: ghcr.io/devops-hcmus/yas-backoffice:latest
      - name: Run Trivy vulnerability scanner
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: 'ghcr.io/devops-hcmus/yas-backoffice:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'
      - name: Push Docker image
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: docker/build-push-action@v6
        with:
          push: true
          context: ./backoffice
          tags: ghcr.io/devops-hcmus/yas-backoffice:latest
      - name: Upload Trivy scan results to GitHub Security tab
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
  ci-pass:
    runs-on: ubuntu-latest
    needs: [test, build]
    if: ${{ always() }}
    steps:
      - name: Verify all required jobs passed
        run: |
          if [ "${{ needs.test.result }}" != "success" ] || [ "${{ needs.build.result }}" != "success" ]; then
            echo "test=${{ needs.test.result }}, build=${{ needs.build.result }}"
            exit 1
          fi
