name: order CI

on:
  workflow_dispatch:
  push:
    paths:
      - 'order/**'
      # any pushes to any, matches anything within order recursively
  pull_request:
    branches: ["main"]
    paths:
      - 'order/**'
      # any pull requests to main, matches anything within order recursively

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'
    - name: Debug Info
      run: |
        pwd
        ls -la
    - name: login to docker hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PA_TOKEN }}
        
    - name: Build and Test order Service
      # -pl order: Only build order project
      # -am: Also make dependencies (build common-library if needed)
      run: mvn -B clean verify -pl order -am # switching to system maven
      
    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: order-test-results
        path: | 
          order/target/*-reports/*.xml
          order/target/site/jacoco/*

    - name: enforce minimum coverage and PR comment
      id: jacoco
      uses: madrapps/jacoco-report@v1.7.2
      with:
        paths: |
          ${{ github.workspace }}/order/target/site/jacoco/jacoco.xml
        token: ${{ secrets.GITHUB_TOKEN }}
        min-coverage-overall: 70
        title: "order coverage"